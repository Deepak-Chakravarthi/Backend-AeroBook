spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/aerobook
    username: postgres
    password: admin@123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database: postgresql
    show-sql: false
    properties:
      dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@aerobook.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    default-encoding: UTF-8
  mvc:
    # Base API path — applied globally
    pathmatch:
      matching-strategy: ant_path_matcher

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      retries: 3
      acks: all
    consumer:
      group-id: aerobook-notifications
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.aerobook.*"
    listener:
      ack-mode: MANUAL_IMMEDIATE


server:
  port: 8091
  servlet:
    context-path: /aero-book


aerobook:
  jwt:
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    expiration-ms: 86400000   # 24 hours

  seat:
    hold-duration-minutes: 15    # seat hold TTL

  notification:
    from-email: noreply@aerobook.com
    from-name: AeroBook
    kafka-enabled: false     # flip to true in Phase 2
  api:
    version: v1
    base-path: /api/v1